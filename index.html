    /* 戲劇化主光源 + 折射光斑(與主系統同款) */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 10%, rgba(255,255,255,0.62), transparent 26%),
        radial-gradient(circle at 80% 30%, rgba(120,190,255,0.3), transparent 34%),
        radial-gradient(circle at 30% 82%, rgba(150,200,250,0.2), transparent 36%);
      mix-blend-mode: screen;
    }
    .card {
      position: relative;
      z-index: 2;
      width: min(340px, 86vw);
      border-radius: 28px;
      box-sizing: border-box;
      text-align: center;
      background: linear-gradient(165deg,
        rgba(255,255,255,0.66) 0%,
        rgba(232,242,253,0.42) 45%,
        rgba(198,222,247,0.5) 100%);
      -webkit-backdrop-filter: blur(24px) saturate(165%);
      backdrop-filter: blur(24px) saturate(165%);
      border: 1.5px solid rgba(255,255,255,0.85);
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.95),
        inset 0 -20px 34px rgba(65,130,205,0.16),
        inset 20px 20px 42px rgba(255,255,255,0.24),
        inset -22px -22px 44px rgba(50,105,175,0.18),
        0 28px 80px rgba(25,65,120,0.32),
        0 8px 24px rgba(25,65,120,0.14),
        0 0 36px rgba(150,210,255,0.22);
    }
    .inner {
      margin: 7px;
      padding: 34px 28px 28px;
      border-radius: 21px;
      background: linear-gradient(180deg, rgba(255,255,255,0.5), rgba(255,255,255,0.26));
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
    }
    /* 水晶玻璃球 + 旋轉圈 */
    .orb {
      position: relative;
      width: 64px; height: 64px;
      border-radius: 50%;
      margin: 0 auto 18px;
      background: radial-gradient(circle at 32% 28%,
        #ffffff 0%,
        rgba(238,246,255,0.92) 35%,
        rgba(196,222,250,0.6) 74%,
        rgba(168,203,242,0.7) 100%);
      border: 1px solid rgba(255,255,255,1);
      box-shadow:
        0 12px 24px rgba(55,100,160,0.36),
        0 0 0 5px rgba(215,236,255,0.55),
        inset 0 2px 5px rgba(255,255,255,1),
        inset 0 -8px 14px rgba(130,172,225,0.55);
    }
    .orb::before {
      content: "";
      position: absolute;
      top: 9px; left: 14px;
      width: 18px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.98);
      filter: blur(2px);
      transform: rotate(-22deg);
    }
    .spinner {
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      border: 3px solid rgba(46,94,158,0.18);
      border-top-color: #2e5e9e;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title {
      font-size: 17px;
      color: #263d58;
      font-weight: 800;
      letter-spacing: 2px;
    }
    .sub {
      font-size: 12.5px;
      color: rgba(38,61,88,0.72);
      font-weight: 500;
      margin: 7px 0 22px;
    }
    /* 手動跳轉:玻璃膠囊連結 */
    a.go {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      padding: 11px 18px;
      border-radius: 999px;
      text-decoration: none;
      color: #fff;
      font-size: 14.5px;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(180deg, #6aa6e8 0%, #3d7dd0 48%, #2f68b8 100%);
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow:
        0 12px 26px rgba(45,95,165,0.4),
        0 3px 8px rgba(45,95,165,0.22),
        inset 0 2px 3px rgba(255,255,255,0.7),
        inset 0 -5px 11px rgba(20,55,110,0.4);
      transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
    }
    a.go::before {
      content: "";
      position: absolute;
      left: 8%; right: 8%; top: 3px;
      height: 47%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.05));
      pointer-events: none;
    }
    a.go:hover { transform: translateY(-1px); filter: brightness(1.05); }
    a.go:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="inner">
      <div class="orb"><div class="spinner"></div></div>
      <div class="title">正在完成登入</div>
      <div class="sub">請稍候，即將返回報價系統…</div>
      <a class="go" id="manual" href="#">若未自動跳轉請點此 ›</a>
    </div>
  </div>
